name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript (eslint + prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-portionmarkdown
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-portionmarkdown/package-lock.json
      - run: npm ci
      - run: npm run check
