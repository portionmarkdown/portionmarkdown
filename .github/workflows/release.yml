name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── Python lint ──────────────────────────────────────────────
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

      # ── TypeScript lint + build + package ────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-portionmarkdown/package-lock.json

      - name: Install dependencies
        working-directory: vscode-portionmarkdown
        run: npm ci

      - name: Lint & type-check TypeScript
        working-directory: vscode-portionmarkdown
        run: npm run check

      - name: Compile & package VSIX
        working-directory: vscode-portionmarkdown
        run: |
          npm run compile
          npx vsce package --out portionmarkdown.vsix

      # ── Create GitHub release ────────────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vscode-portionmarkdown/portionmarkdown.vsix
            md2pdf.py
